services:
  api:
    build: .
    # Código em volume + reload: alterações em app/ refletem-se sem rebuild.
    volumes:
      - ./app:/app/app
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    ports:
      - "${PORT:-8000}:8000"
    environment:
      APP_NAME: ${APP_NAME:-pjsa-api}
      DEBUG: ${DEBUG:-false}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
